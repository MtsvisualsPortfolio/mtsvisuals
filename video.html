<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vídeo - MTS Visuals</title>

<style>
body{
background:#0b0b0b;
color:#fff;
font-family:sans-serif;
padding:40px;
}

/* CARD */
.card{
padding:20px;
border:1px solid rgba(255,255,255,.1);
margin-bottom:10px;
cursor:pointer;
transition:.3s;
}
.card:hover{background:#111}

/* PLAYER */
#player{
margin-top:30px;
}

/* BOTÃO */
.btn{
margin-top:20px;
display:inline-block;
padding:10px 20px;
border:1px solid #fff;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Vídeo</h1>

<!-- SUBSEÇÕES -->
<div class="card" onclick="openSub('event')">Event Film</div>
<div class="card" onclick="openSub('music')">Music Video</div>
<div class="card" onclick="openSub('brand')">Branded Content</div>

<!-- PREVIEW -->
<div id="content"></div>

<script>

function openSub(type){

let html = "";

if(type === "event"){
html = `
<h2>Event Film</h2>
<p>Vídeos de melhores momentos de eventos.</p>

<iframe src="https://player.vimeo.com/video/76979871"
width="100%" height="400"></iframe>

<div class="btn" onclick="verMais()">Ver mais</div>
`;
}

if(type === "music"){
html = `
<h2>Music Video</h2>
<p>Videoclipes com direção estética.</p>

<iframe src="https://player.vimeo.com/video/22439234"
width="100%" height="400"></iframe>

<div class="btn" onclick="verMais()">Ver mais</div>
`;
}

if(type === "brand"){
html = `
<h2>Branded Content</h2>
<p>Conteúdos para marcas.</p>

<iframe src="https://player.vimeo.com/video/146022717"
width="100%" height="400"></iframe>

<div class="btn" onclick="verMais()">Ver mais</div>
`;
}

document.getElementById("content").innerHTML = html;
}

function verMais(){
alert("Aqui vai abrir os projetos completos depois");
}

</script>

</body>
</html>
