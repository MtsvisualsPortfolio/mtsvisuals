<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vídeo | MTS Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#020202;
color:#fff;
overflow-x:hidden;
}

/* FADE PAGE */
body.fade-out{
opacity:0;
transition:0.6s ease;
}

/* GLOW CURSOR */
.cursor-glow{
position:fixed;
width:300px;
height:300px;
background:radial-gradient(circle, rgba(212,175,55,0.15), transparent 70%);
pointer-events:none;
z-index:0;
transform:translate(-50%,-50%);
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 8%;
background:rgba(0,0,0,.4);
backdrop-filter:blur(20px);
z-index:1000;
}

.logo{
font-family:'Great Vibes';
font-size:22px;
cursor:pointer;
}

/* HERO */
.hero{
height:60vh;
display:flex;
align-items:center;
padding:8%;
z-index:1;
position:relative;
}

.hero h1{
font-size:48px;
}

.hero p{
opacity:.7;
margin-top:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:60px 8%;
position:relative;
z-index:1;
}

/* CARD */
.card{
position:relative;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
cursor:pointer;
transition:.4s;
text-decoration:none;
color:#fff;
overflow:hidden;
height:200px;
}

/* LIGHT EFFECT */
.card::before{
content:"";
position:absolute;
inset:0;
background:radial-gradient(circle at var(--x) var(--y), rgba(212,175,55,0.2), transparent 40%);
opacity:0;
transition:.3s;
}

.card:hover::before{
opacity:1;
}

.card:hover{
transform:translateY(-10px);
border-color:#d4af37;
}

/* TEXT */
.desc{
opacity:.7;
transition:.4s;
}

.sub{
opacity:0;
transform:translateY(20px);
transition:.4s;
font-size:13px;
color:#aaa;
}

.card:hover .desc{
opacity:0;
transform:translateY(-10px);
}

.card:hover .sub{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<div class="cursor-glow" id="cursorGlow"></div>

<nav>
<div class="logo" onclick="goHome()">Visuals</div>
</nav>

<section class="hero">
<div>
<h1>Vídeo</h1>
<p>Produção audiovisual passando pela ideia até o impacto final.</p>
</div>
</section>

<section class="grid">

<a href="branded.html" class="card link">
<h2>Branded</h2>
<div class="desc">Conteúdo para marcas</div>
<div class="sub">Campanhas • Branding • Conteúdo digital</div>
</a>

<a href="event.html" class="card link">
<h2>Event</h2>
<div class="desc">Melhores momentos</div>
<div class="sub">Shows • Festivais • Aftermovies</div>
</a>

<a href="music.html" class="card link">
<h2>Music</h2>
<div class="desc">Clipes musicais</div>
<div class="sub">Narrativa • Estética • Performance</div>
</a>

</section>

<script>

/* CURSOR GLOW */
const glow = document.getElementById("cursorGlow");

document.addEventListener("mousemove", e=>{
glow.style.left = e.clientX + "px";
glow.style.top = e.clientY + "px";
});

/* CARD LIGHT FOLLOW */
document.querySelectorAll('.card').forEach(card=>{
card.addEventListener('mousemove', e=>{
const rect = card.getBoundingClientRect();
card.style.setProperty('--x', (e.clientX - rect.left) + 'px');
card.style.setProperty('--y', (e.clientY - rect.top) + 'px');
});
});

/* PAGE TRANSITION */
document.querySelectorAll(".link").forEach(link=>{
link.addEventListener("click", e=>{
e.preventDefault();
document.body.classList.add("fade-out");
setTimeout(()=>{
window.location.href = link.href;
},600);
});
});

function goHome(){
document.body.classList.add("fade-out");
setTimeout(()=>{
window.location.href="index.html";
},600);
}
</script>

</body>
</html>
