<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Film | MTS Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#050505;
color:#fff;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 8%;
background:rgba(0,0,0,.5);
}

.logo{cursor:pointer}

/* HERO */
.hero{
height:60vh;
display:flex;
align-items:center;
padding:8%;
}

.hero h1{font-size:48px}

/* PREVIEW */
.preview{
height:400px;
margin:40px 8%;
background:rgba(255,255,255,0.05);
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px 8%;
}

.video{
height:200px;
background:#111;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
transition:.3s;
}

.video:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<nav>
<div class="logo" onclick="goBack()">Visuals</div>
</nav>

<section class="hero">
<h1>Branded Content</h1>
</section>

<div class="preview">
Preview principal (colocar vídeo depois)
</div>

<section class="grid">
<div class="video">Projeto 1</div>
<div class="video">Projeto 2</div>
<div class="video">Projeto 3</div>
</section>

<script>
function goBack(){
window.location.href = "video.html";
}
</script>

</body>
</html>
