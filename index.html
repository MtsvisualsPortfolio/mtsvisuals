<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTS Visuals</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#07080f;
  color:#fff;
  font-family:Arial;
  overflow-x:hidden;
  cursor:none;
}

/* PRELOADER */
#preloader{
  position:fixed;
  inset:0;
  background:#07080f;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:.8s;
}
#preloader.hide{opacity:0;pointer-events:none}

/* CURSOR */
#cur,#cur-r{
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
}
#cur{width:8px;height:8px;background:#d4a853;}
#cur-r{width:30px;height:30px;border:1px solid rgba(212,168,83,.4);}
#cur.h{width:20px;height:20px}
#cur-r.h{width:50px;height:50px}

/* HERO */
#hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:60px;
}

.hero-title span{
  opacity:0;
  transform:translateY(20px);
  display:inline-block;
  animation:letter .6s forwards;
}
@keyframes letter{
  to{opacity:1;transform:translateY(0)}
}

/* AREAS */
.area-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
}
.area-cell{
  padding:60px;
  border:1px solid rgba(255,255,255,.08);
  transition:.3s;
}
.area-cell:hover{background:#111}

/* PROJECTS */
#section-page{
  display:block;
  padding:60px;
}

.proj-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:10px;
}

.proj-card{
  height:200px;
  background:linear-gradient(135deg,#111,#1a1a1a);
  display:flex;
  align-items:flex-end;
  padding:20px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.proj-card::after{
  content:"PLAY";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:.2;
  font-size:20px;
  letter-spacing:2px;
}

.proj-title{
  z-index:2;
}

/* MODAL */
.modal-ov{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}
.modal-ov.open{
  opacity:1;
  pointer-events:all;
}

.modal-box{
  width:80vw;
  height:45vw;
}

/* COLOR */
#color-grade{
  position:fixed;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition:.5s;
}
#color-grade.active{opacity:1}

</style>
</head>

<body>

<div id="preloader">MTS</div>
<div id="color-grade"></div>

<div id="cur"></div>
<div id="cur-r"></div>

<section id="hero">
  <h1 class="hero-title" id="heroTitle"></h1>
</section>

<section class="area-grid">
  <div class="area-cell" data-area="video">VIDEO</div>
  <div class="area-cell" data-area="motion">MOTION</div>
  <div class="area-cell" data-area="3d">3D</div>
  <div class="area-cell" data-area="ilustra">ILUSTRA</div>
</section>

<section id="section-page">
  <div class="proj-grid">

    <div class="proj-card" data-video="">
      <div class="proj-title">Projeto 01</div>
    </div>

    <div class="proj-card" data-video="">
      <div class="proj-title">Projeto 02</div>
    </div>

    <div class="proj-card" data-video="">
      <div class="proj-title">Projeto 03</div>
    </div>

  </div>
</section>

<div class="modal-ov">
  <div class="modal-box"></div>
</div>

<script>

/* PRELOADER */
window.addEventListener('load', ()=>{
  setTimeout(()=>{
    document.getElementById('preloader').classList.add('hide');
  },500);
});

/* HERO TEXT */
const text="MTS VISUALS";
const hero=document.getElementById('heroTitle');

text.split("").forEach((l,i)=>{
  const span=document.createElement("span");
  span.innerText=l;
  span.style.animationDelay=i*0.05+"s";
  hero.appendChild(span);
});

/* CURSOR */
const cur=document.getElementById('cur');
const curr=document.getElementById('cur-r');

document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+"px";
  cur.style.top=e.clientY+"px";
  curr.style.left=e.clientX+"px";
  curr.style.top=e.clientY+"px";
});

document.querySelectorAll('div').forEach(el=>{
  el.onmouseenter=()=>{cur.classList.add('h');curr.classList.add('h')}
  el.onmouseleave=()=>{cur.classList.remove('h');curr.classList.remove('h')}
});

/* MODAL */
const modal=document.querySelector('.modal-ov');
const box=document.querySelector('.modal-box');

document.querySelectorAll('.proj-card').forEach(card=>{
  card.onclick=()=>{
    const link=card.dataset.video;

    if(!link){
      box.innerHTML="<p style='color:white'>Vídeo não adicionado ainda</p>";
    }else{
      box.innerHTML=`
      <iframe width="100%" height="100%"
      src="${link}?autoplay=1"
      frameborder="0" allow="autoplay"></iframe>`;
    }

    modal.classList.add('open');
  };
});

modal.onclick=()=>{
  modal.classList.remove('open');
  box.innerHTML="";
};

/* COLOR SYSTEM */
const colors={
  video:'rgba(255,50,50,.2)',
  motion:'rgba(255,180,50,.2)',
  "3d":'rgba(50,120,255,.2)',
  ilustra:'rgba(180,50,255,.2)'
};

const colorGrade=document.getElementById('color-grade');

document.querySelectorAll('.area-cell').forEach(cell=>{
  cell.onclick=()=>{
    const type=cell.dataset.area;

    colorGrade.style.background=colors[type];
    colorGrade.classList.add('active');
  };
});

</script>

</body>
</html>
