<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTS Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#000;
color:#fff;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 8%;
background:rgba(0,0,0,.4);
backdrop-filter:blur(20px);
}

/* LOGO */
.logo{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.mts{
display:flex;
align-items:flex-end;
gap:2px;
}

/* VISOR */
.letter{
height:28px; /* 🔥 altura final no menu */
overflow:hidden;
position:relative;
}

/* IMG */
.letter img{
display:block;
transform-origin:top left;
}

/* TEXTO */
.logo-text{
font-family:'Great Vibes';
font-size:28px;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
padding:8%;
}

.hero h1{
font-size:60px;
}
</style>
</head>

<body>

<nav>
<div class="logo">

<div class="mts">
<div class="letter"><img id="m" src="sprite-m.png"></div>
<div class="letter"><img id="t" src="sprite-t.png"></div>
<div class="letter"><img id="s" src="sprite-s.png"></div>
</div>

<span class="logo-text">Visuals</span>
</div>
</nav>

<section class="hero">
<h1>MTS Visuals</h1>
</section>

<script>

/* SPRITE ORIGINAL */
const original = {
  m: 904,
  t: 904,
  s: 791
};

const frames = {
  m: 8,
  t: 8,
  s: 7
};

/* ALTURA FINAL */
const targetHeight = 28;

/* ESCALA */
const scale = {
  m: targetHeight / (original.m / frames.m),
  t: targetHeight / (original.t / frames.t),
  s: targetHeight / (original.s / frames.s)
};

let current = { m:0, t:0, s:0 };

/* SET FRAME PERFEITO */
function setFrame(el, frame, frameHeight, scale){
  el.style.transform = `
    translateY(-${frame * frameHeight}px)
    scale(${scale})
  `;
}

/* LOOP */
setInterval(()=>{

  current.m = (current.m+1)%frames.m;
  current.t = (current.t+1)%frames.t;
  current.s = (current.s+1)%frames.s;

  setFrame(m, current.m, original.m/frames.m, scale.m);
  setFrame(t, current.t, original.t/frames.t, scale.t);
  setFrame(s, current.s, original.s/frames.s, scale.s);

},800);

</script>

</body>
</html>
