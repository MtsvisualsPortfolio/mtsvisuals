<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTS Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#050505;
color:#fff;
overflow-x:hidden;
}

/* VIDEO FUNDO */
.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
filter:brightness(0.4) contrast(1.2) blur(8px);
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:linear-gradient(to bottom, rgba(0,0,0,0.7), #050505);
z-index:-2;
}

/* TEXTURA */
.texture{
position:fixed;
inset:0;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:.05;
z-index:-1;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-family:'Great Vibes';
font-size:26px;
cursor:pointer;
}

/* HERO */
.hero{
height:85vh;
display:flex;
align-items:center;
padding:8%;
}

.hero h1{
font-size:70px;
line-height:1.05;
}

.light{opacity:.6}
.strong{font-family:'Playfair Display';font-size:80px}
.script{font-family:'Great Vibes';font-size:85px;color:#d4af37}

/* SECTION */
.section{
padding:80px 8%;
}

/* GLASS */
.glass{
background:rgba(255,255,255,0.05);
border:1px solid rgba(212,175,55,0.2);
backdrop-filter:blur(18px);
border-radius:20px;
padding:30px;
position:relative;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:25px;
}

.card{
padding:28px;
border-radius:18px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.1);
transition:.4s;
cursor:pointer;
text-decoration:none;
color:#fff;
}

.card:hover{
transform:translateY(-8px);
border-color:#d4af37;
box-shadow:0 10px 40px rgba(212,175,55,0.2);
}

/* TEXT */
.text{
font-family:'Playfair Display';
line-height:1.7;
opacity:.9;
}

/* TIMELINE */
.timeline{
border-left:1px solid rgba(255,255,255,0.2);
padding-left:20px;
}

.timeline div{
margin-bottom:12px;
}

/* NUMBERS */
.numbers{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:20px;
margin-top:20px;
text-align:center;
}

.numbers h3{
color:#d4af37;
font-size:34px;
}

/* BRANDS */
.brands{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
margin-top:20px;
}

.brands a{
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.05);
text-align:center;
transition:.3s;
text-decoration:none;
color:#fff;
}

.brands a:hover{
background:#d4af37;
color:#000;
}

/* CONTATO */
.contact{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-top:20px;
}

.contact a{
padding:10px 18px;
border-radius:30px;
border:1px solid rgba(212,175,55,0.3);
text-decoration:none;
color:#fff;
transition:.3s;
}

.contact a:hover{
background:#d4af37;
color:#000;
}

/* FADE */
.fade{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<!-- VIDEO FUNDO -->
<video class="bg-video" autoplay muted loop playsinline>
<source src="https://cdn.coverr.co/videos/coverr-liquid-metal-abstract-5173/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<div class="texture"></div>

<nav>
<div class="logo" onclick="scrollToTop()">Visuals</div>
</nav>

<section class="hero">
<h1>
<span class="light">Todo projeto carrega</span><br>
<span class="strong">uma ideia.</span><br><br>
<span class="light">Visuais são a forma</span><br>
<span class="script">dela existir.</span>
</h1>
</section>

<section class="section fade">
<div class="glass">
<h2>Criação</h2>
<div class="grid">
<a href="video.html" class="card">Vídeo</a>
<div class="card">Motion</div>
<div class="card">3D</div>
<div class="card">Ilustração</div>
</div>
</div>
</section>

<section class="section fade">
<div class="glass">
<h2>Sobre</h2>
<p class="text">
(cole aqui seu texto completo que já fizemos)
</p>
</div>
</section>

<section class="section fade">
<div class="glass">
<h2>Contato</h2>
<div class="contact">
<a href="https://wa.me/5511977520741">WhatsApp</a>
<a href="mailto:mtsvisualss@gmail.com">Email</a>
<a href="https://instagram.com/mtsvisualss">Instagram</a>
</div>
</div>
</section>

<script>
const fades=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
fades.forEach(el=>{
if(el.getBoundingClientRect().top<window.innerHeight-100){
el.classList.add('show');
}
});
});

function scrollToTop(){
scrollTo({top:0,behavior:'smooth'});
}
</script>

</body>
</html>
