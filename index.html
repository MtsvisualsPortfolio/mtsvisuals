<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTS Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#050505;
color:#fff;
overflow-x:hidden;
}

/* LOADER */
.loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
transition:1s;
}

.loader h1{
font-family:'Great Vibes';
font-size:40px;
opacity:0;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
to{opacity:1}
}

.loader.hide{
opacity:0;
pointer-events:none;
}

/* CURSOR GLOW */
.cursor-glow{
position:fixed;
width:300px;
height:300px;
background:radial-gradient(circle, rgba(212,175,55,0.15), transparent 70%);
pointer-events:none;
z-index:0;
transform:translate(-50%,-50%);
}

/* FADE PAGE */
.fade-out{
opacity:0;
transition:.6s;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 8%;
background:rgba(0,0,0,.4);
backdrop-filter:blur(20px);
z-index:1000;
}

.logo{
font-family:'Great Vibes';
cursor:pointer;
font-size:22px;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
padding:8%;
}

.hero h1{
font-size:64px;
max-width:800px;
}

/* SECTION */
.section{
padding:120px 8%;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

/* CARD */
.card{
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.1);
cursor:pointer;
transition:.4s;
text-decoration:none;
color:#fff;
}

.card:hover{
transform:translateY(-10px);
border-color:#d4af37;
}

/* TEXT */
.text{
font-family:'Playfair Display';
line-height:1.7;
opacity:.85;
max-width:700px;
}

/* FADE SCROLL */
.fade{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
<h1>Visuals</h1>
</div>

<!-- CURSOR -->
<div class="cursor-glow" id="cursorGlow"></div>

<nav>
<div class="logo" onclick="goTop()">Visuals</div>
</nav>

<section class="hero">
<h1>
Todo projeto carrega uma ideia.<br>
Visuais são a forma dela existir.
</h1>
</section>

<section class="section fade">
<h2>Criação</h2>

<div class="grid">
<a href="video.html" class="card link">Vídeo</a>
<a href="#" class="card">Motion</a>
<a href="#" class="card">3D</a>
<a href="#" class="card">Ilustração</a>
</div>
</section>

<section class="section fade">
<h2>Sobre</h2>
<p class="text">
Minha base multidisciplinar — passando por ilustração, vídeo, motion e 3D — permite enxergar, resolver e construir ideias com profundidade.
</p>
</section>

<script>

/* LOADER */
window.addEventListener("load", ()=>{
setTimeout(()=>{
document.getElementById("loader").classList.add("hide");
},2000);
});

/* CURSOR */
const glow = document.getElementById("cursorGlow");
document.addEventListener("mousemove", e=>{
glow.style.left = e.clientX+"px";
glow.style.top = e.clientY+"px";
});

/* FADE SCROLL */
const fades = document.querySelectorAll('.fade');
window.addEventListener('scroll', ()=>{
fades.forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight-100){
el.classList.add('show');
}
});
});

/* PAGE TRANSITION */
document.querySelectorAll(".link").forEach(link=>{
link.addEventListener("click", e=>{
e.preventDefault();
document.body.classList.add("fade-out");
setTimeout(()=>{
window.location.href = link.href;
},600);
});
});

function goTop(){
window.scrollTo({top:0,behavior:'smooth'});
}
</script>

</body>
</html>
