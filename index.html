<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTS Visuals</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#07080f;
  color:#fff;
  font-family:Arial;
}

/* HERO */
#hero{
  height:80vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
}

/* SECTION */
.section{
  padding:60px;
  border-top:1px solid rgba(255,255,255,.1);
}

.section h2{
  font-size:28px;
  margin-bottom:20px;
}

/* SUBSECTIONS */
.sub-list{
  margin-bottom:20px;
  opacity:.7;
  line-height:1.8;
}

/* VIDEO PREVIEW */
.preview{
  width:100%;
  height:400px;
  margin-bottom:20px;
}

/* BUTTON */
.btn{
  padding:12px 20px;
  border:1px solid #fff;
  display:inline-block;
  cursor:pointer;
  margin-bottom:30px;
}

/* GRID */
.grid{
  display:none;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:10px;
}

.card{
  background:#111;
  padding:20px;
  cursor:pointer;
  transition:.3s;
}
.card:hover{
  background:#222;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}
.modal.active{
  opacity:1;
  pointer-events:all;
}

.modal-box{
  width:80vw;
  height:45vw;
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
  MTS VISUALS
</section>

<!-- VIDEO SECTION -->
<section class="section">

<h2>VIDEO</h2>

<div class="sub-list">
1. Branded Content<br>
2. Music Video<br>
3. Event Film<br>
4. Podcast Production<br>
5. Social Clips<br>
6. Documentary<br>
7. Corporate Video
</div>

<!-- PREVIEW VIDEO -->
<iframe class="preview"
src="https://player.vimeo.com/video/111111111"
frameborder="0" allow="autoplay; fullscreen"></iframe>

<div class="btn" onclick="toggleGrid('videoGrid')">
Ver mais
</div>

<div id="videoGrid" class="grid">

<div class="card" data-video="https://player.vimeo.com/video/111111111">Projeto 1</div>
<div class="card" data-video="https://player.vimeo.com/video/222222222">Projeto 2</div>
<div class="card" data-video="https://player.vimeo.com/video/333333333">Projeto 3</div>

</div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<script>

/* TOGGLE GRID */
function toggleGrid(id){
  const grid = document.getElementById(id);
  grid.style.display = grid.style.display === 'grid' ? 'none' : 'grid';
}

/* MODAL */
const modal = document.getElementById('modal');
const box = document.getElementById('modalBox');

document.querySelectorAll('.card').forEach(card=>{
  card.onclick=()=>{
    modal.classList.add('active');
    box.innerHTML = `
      <iframe width="100%" height="100%"
      src="${card.dataset.video}?autoplay=1"
      frameborder="0" allow="autoplay; fullscreen">
      </iframe>`;
  };
});

modal.onclick=()=>{
  modal.classList.remove('active');
  box.innerHTML="";
};

</script>

</body>
</html>
