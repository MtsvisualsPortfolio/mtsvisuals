<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MTS Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  color:#fff;
  background:#050505;
  overflow-x:hidden;
}

/* FUNDO CINEMATOGRÁFICO */
body::before, body::after{
  content:"";
  position:fixed;
  inset:-20%;
  background:
    radial-gradient(circle at 30% 30%, rgba(212,175,55,0.25), transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(255,255,255,0.08), transparent 60%);
  filter:blur(80px);
  animation:move 20s infinite alternate ease-in-out;
  z-index:-2;
}

body::after{
  animation-direction:alternate-reverse;
}

@keyframes move{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(80px,60px) scale(1.2)}
}

/* HERO */
.hero{
  height:100vh;
  padding:8%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.logo{
  font-family:'Great Vibes';
  font-size:28px;
  opacity:.7;
}

.hero h1{
  font-size:64px;
  line-height:1.1;
  margin-top:20px;
}

.gold{color:#d4af37}

.hero p{
  margin-top:20px;
  opacity:.6;
}

/* BOTÕES */
.nav{
  margin-top:40px;
  display:flex;
  gap:12px;
}

.nav button{
  padding:10px 20px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(10px);
  color:#fff;
  cursor:pointer;
  transition:.3s;
}
.nav button:hover{
  background:#fff;
  color:#000;
}

/* SEÇÃO */
.section{
  padding:100px 8%;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(30px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 40px rgba(212,175,55,0.1);
  padding:40px;
  margin-bottom:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

/* CARD */
.card{
  border-radius:16px;
  overflow:hidden;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(10px);
  cursor:pointer;
  transition:.4s;
}
.card:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

/* THUMB */
.thumb{
  height:160px;
  background:linear-gradient(120deg,#111,#222);
}

/* TITLE */
.title{
  padding:16px;
}

/* TEXTO */
.text{
  font-family:'Playfair Display';
  line-height:1.7;
  opacity:.85;
}

/* ANIMAÇÃO */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}
.fade.show{
  opacity:1;
  transform:translateY(0);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}
.modal.active{
  opacity:1;
  pointer-events:all;
}
.modal iframe{
  width:80vw;
  height:45vw;
}
</style>
</head>

<body>

<section class="hero">
<div class="logo">Visuals</div>

<h1>
Todo projeto<br>
carrega <span class="gold">uma ideia</span>.<br>
Visuais são a forma dela existir.
</h1>

<p>Direção criativa • Vídeo • Motion • 3D</p>

<div class="nav">
<button onclick="scrollToSection('video')">Vídeo</button>
<button onclick="scrollToSection('ilustra')">Ilustração</button>
<button onclick="scrollToSection('3d')">3D</button>
<button onclick="scrollToSection('motion')">Motion</button>
</div>
</section>

<section class="section fade" id="video">
<div class="glass">
<h2>Vídeo</h2>
<div class="grid">
<div class="card" data-video="https://player.vimeo.com/video/111111111">
<div class="thumb"></div>
<div class="title">Branded Content</div>
</div>
</div>
</div>
</section>

<section class="section fade">
<div class="glass">
<h2>Sobre</h2>
<p class="text">
Matheus dos Santos Alves, criador multidisciplinar explorando imagem, som e movimento como linguagem.
</p>
</div>
</section>

<div class="modal" id="modal"></div>

<script>
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

const modal = document.getElementById('modal');

document.querySelectorAll('.card').forEach(card=>{
  card.onclick=()=>{
    modal.classList.add('active');
    modal.innerHTML = `
    <iframe src="${card.dataset.video}?autoplay=1"
    frameborder="0" allow="autoplay; fullscreen"></iframe>`;
  }
});

modal.onclick=()=>{
  modal.classList.remove('active');
  modal.innerHTML="";
}

/* SCROLL ANIMATION */
const fades = document.querySelectorAll('.fade');

window.addEventListener('scroll', ()=>{
  fades.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
